services:
  business-kz-bot:
    build:
      context: ./telegram-bot
    container_name: business-kz-bot
    restart: unless-stopped
    env_file:
      - ./telegram-bot/.env
    environment:
      - DB_PATH=/data/bot.db
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - bot_data:/data
      - bot_backups:/app/backups

volumes:
  bot_data:
  bot_backups:

services:
  business-kz-bot:
    build:
      context: ./telegram-bot
    container_name: business-kz-bot
    restart: unless-stopped
    env_file:
      - ./telegram-bot/.env
    environment:
      - DB_PATH=/data/bot.db
    ports:
      - "3001:3001"
    volumes:
      - bot_data:/data
      - bot_backups:/app/backups

volumes:
  bot_data:
  bot_backups:

name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  telegram-bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: telegram-bot/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Format check
        run: npm run format:check

  web-react:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-react

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web-react/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
